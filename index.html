<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nifty Futures Order Book (Dhan)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
      margin: 0;
    }

    header, footer {
      text-align: center;
      padding: 1rem;
    }

    header {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: #fff;
    }

    footer {
      background: #222;
      color: #ccc;
      font-size: 0.9em;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    section {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      margin: 0.75rem 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      transition: transform 0.2s ease;
    }
    section:hover {
      transform: translateY(-2px);
    }

    h2 {
      margin-top: 0;
      font-size: 1.2em;
      color: #4CAF50;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin: 0.5rem 0;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .form-group input {
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1.1em;
    }

    .result-box {
      background: #f9fafb;
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-size: 1em;
    }

    #decision {
      font-weight: bold;
      font-size: 1.4em;
      text-align: center;
      transition: background 0.3s ease, color 0.3s ease;
      padding: 0.5rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header><h1>Nifty Futures Order Book (Dhan)</h1></header>
  <main>
    <section>
      <h2>Price Calculation</h2>
      <div class="form-group"><label>Low</label><input type="number" id="low"></div>
      <div class="form-group"><label>Current</label><input type="number" id="current"></div>
      <div class="form-group"><label>High</label><input type="number" id="high"></div>
      <div class="result-box"><strong>P1 (%):</strong> <span id="p1">0%</span></div>
    </section>

    <section>
      <h2>Buyers & Sellers</h2>
      <div class="form-group"><label>Buyers</label><input type="number" id="buyers"></div>
      <div class="form-group"><label>Sellers</label><input type="number" id="sellers"></div>
      <div class="result-box"><strong>P2 (%):</strong> <span id="p2">0%</span></div>
    </section>

    <section>
      <h2>Decision</h2>
      <div class="result-box">
        <strong>Decision:</strong> <span id="decision">Waiting...</span><br>
        <small>Last Updated: <span id="lastUpdated">--</span></small>
      </div>
    </section>
  </main>
  <footer><p>© 2026 My GitHub Pages Site</p></footer>

  <script>
    let p1Value=null,p2Value=null;

    function updatePriceCalculation(){
      const low=parseFloat(document.getElementById('low').value),
            current=parseFloat(document.getElementById('current').value),
            high=parseFloat(document.getElementById('high').value);
      if(!isNaN(low)&&!isNaN(current)&&!isNaN(high)){
        const diff=high-low;
        p1Value=diff!==0?((current-low)/diff)*100:0;
        document.getElementById('p1').textContent=p1Value.toFixed(2)+"%";
      }
      updateDecision();
    }

    function updateBuyersSellers(){
      const buyers=parseFloat(document.getElementById('buyers').value),
            sellers=parseFloat(document.getElementById('sellers').value);
      if(!isNaN(buyers)&&!isNaN(sellers)){
        const total=buyers+sellers;
        p2Value=total!==0?(buyers/total)*100:0;
        document.getElementById('p2').textContent=p2Value.toFixed(2)+"%";
      }
      updateDecision();
    }

    function updateDecision(){
      const decision=document.getElementById('decision');
      if(p1Value!==null&&p2Value!==null){
        if(p2Value>67&&(p1Value<10||p1Value>90)){
          decision.textContent="BUY";
          decision.style.background="#d4edda";
          decision.style.color="#155724";
        }
        else if(p2Value<33&&(p1Value<10||p1Value>90)){
          decision.textContent="SELL";
          decision.style.background="#f8d7da";
          decision.style.color="#721c24";
        }
        else {
          decision.textContent="No Action";
          decision.style.background="#fff3cd";
          decision.style.color="#856404";
        }
      } else {
        decision.textContent="Waiting...";
        decision.style.background="";
        decision.style.color="";
      }
    }

    function updateTimestamp(){
      document.getElementById("lastUpdated").textContent=new Date().toLocaleString();
    }

    async function fetchMarketfeedQuote(){
      try{
        const res=await fetch("https://dhan-proxy.navin5641.workers.dev/");
        const data=await res.json();
        const niftyData=data.data.NSE_FNO["51714"]; // Replace with actual instrument ID

        if(niftyData?.ohlc){
          document.getElementById("low").value=niftyData.ohlc.low ?? "";
          document.getElementById("high").value=niftyData.ohlc.high ?? "";
        }
        document.getElementById("current").value=niftyData.last_price ?? "";
        updatePriceCalculation();

        document.getElementById("buyers").value=niftyData.buy_quantity ?? "";
        document.getElementById("sellers").value=niftyData.sell_quantity ?? "";
        updateBuyersSellers();

        updateTimestamp();
      }catch(err){console.error("Error fetching marketfeed quote:",err);}
    }

    window.onload=()=>{
      fetchMarketfeedQuote();
      setInterval(fetchMarketfeedQuote,10000); // refresh every 10s
    };
  </script>
</body>
</html>
