<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Decision Tool</title>

<style>
    body { font-family: Arial; margin: 15px; background:#f7f7f7; }
    .container {
        background:#fff; padding:20px; border-radius:12px;
        max-width:480px; margin:auto;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    .row { display:flex; align-items:center; margin-top:12px; }
    label { width:40%; font-weight:bold; font-size:16px; }
    input { width:60%; padding:10px; border-radius:8px; border:1px solid #ccc; font-size:16px; }
    .result { margin-top:20px; padding:12px; border-radius:8px; text-align:center; font-weight:bold; }
    button {
        margin-top:20px; padding:14px; width:100%;
        background:#007bff; color:white; border:none; border-radius:8px;
        font-size:18px;
    }
</style>

<script>
// ---------------- SOUND ALERTS ----------------

const monitorSound = new Audio("data:audio/wav;base64,UklGRhQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQgAAAAA/////w==");
const buySound     = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQgAAAAA////AAH//wD///8=");
const sellSound    = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQgAAAAA////AP///wD8//8=");

let soundEnabled = false;
let lastFinal = "";

function enableSound() {
    soundEnabled = true;
}

// ---------------- AUTO FETCH LOW/HIGH ----------------

function fetchTargets() {
    const workerURL = "https://nifty50fetch.navin5641.workers.dev/?t=" + Date.now();

    fetch(workerURL)
        .then(r => r.text())
        .then(html => {
            const block = html.match(/<div id="targets"[\s\S]*?<\/div>/i);
            if (!block) return;

            let cleaned = block[0].replace(/<[^>]*>/g, " ");

            const pattern = /are\s*([0-9.]+)\s*on downside\s*and\s*([0-9.]+)\s*on upside/i;
            const m = cleaned.match(pattern);

            if (!m) return;

            document.getElementById("low").value = m[1];
            document.getElementById("high").value = m[2];

            calculate();
        })
        .catch(err => console.error("Fetch error:", err));
}

// ---------------- CALC LOGIC ----------------

function calculate() {
    let current = document.getElementById("current").value;
    let low     = document.getElementById("low").value;
    let high    = document.getElementById("high").value;
    let buyers  = document.getElementById("buyers").value;
    let sellers = document.getElementById("sellers").value;

    let price = "", ratio = "", final = "";

    // Price Decision
    if (current && low && high) {
        current = parseFloat(current);
        low     = parseFloat(low);
        high    = parseFloat(high);

        if (Math.abs(current - low)/low <= 0.001) price = "BUY";
        else if (Math.abs(current - high)/high <= 0.001) price = "SELL";
        else price = "HOLD";
    }

    // Buyer/Seller Decision
    if (buyers && sellers) {
        buyers  = parseFloat(buyers);
        sellers = parseFloat(sellers);

        if (buyers >= 2*sellers) ratio = "BUY";
        else if (sellers >= 2*buyers) ratio = "SELL";
        else if (buyers >= 1.7*sellers) ratio = "MONITOR BUY";
        else if (sellers >= 1.7*buyers) ratio = "MONITOR SELL";
        else ratio = "HOLD";
    }

    // Final Decision
    if (price && ratio) {
        if (price==="BUY" && ratio==="BUY") final="BUY";
        else if (price==="SELL" && ratio==="SELL") final="SELL";
        else if (price==="BUY" && ratio==="SELL")  final="SELL";
        else if (price==="SELL" && ratio==="BUY")  final="BUY";
        else final="HOLD";
    }

    // Sound Alerts
    if (soundEnabled && final !== "" && final !== lastFinal) {
        if (final==="BUY") buySound.play();
        else if (final==="SELL") sellSound.play();
        else if (ratio.includes("MONITOR")) monitorSound.play();
    }

    lastFinal = final;

    // UI updates
    document.getElementById("priceResult").innerHTML = price ? "Price Decision: " + price : "";
    document.getElementById("ratioResult").innerHTML = ratio ? "Buyer/Seller Decision: " + ratio : "";
    document.getElementById("finalResult").innerHTML = final ? "FINAL SIGNAL: " + final : "";

    document.getElementById("finalResult").style.background =
        final==="BUY" ? "#c3f7c3" :
        final==="SELL" ? "#f7c3c3" :
        final==="HOLD" ? "#fff4c3" : "transparent";
}

window.onload = fetchTargets;
</script>
</head>

<body>
<div class="container">

<h2>📈 Trading Decision Tool</h2>

<button onclick="enableSound()">🔊 ENABLE SOUND</button>

<div class="row"><label>Current Price</label><input id="current" type="number" oninput="calculate()"></div>
<div class="row"><label>Predicted Low</label><input id="low" type="number" oninput="calculate()"></div>
<div class="row"><label>Predicted High</label><input id="high" type="number" oninput="calculate()"></div>

<div id="priceResult" class="result"></div>

<div class="row"><label>Buyer Count</label><input id="buyers" type="number" oninput="calculate()"></div>
<div class="row"><label>Seller Count</label><input id="sellers" type="number" oninput="calculate()"></div>

<div id="ratioResult" class="result"></div>
<div id="finalResult" class="result"></div>

</div>
</body>
</html>
